<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storellm - Multimodal Notebook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col overflow-hidden text-slate-800">

    <!-- Header -->
    <header class="bg-white border-b p-4 flex justify-between items-center shadow-sm z-10">
        <h1 class="text-xl font-bold text-indigo-600 tracking-tight">Storellm</h1>
        <div class="flex items-center gap-3">
            <div id="statusIndicator" class="w-3 h-3 rounded-full bg-slate-300"></div>
            <input type="password" id="apiKey" placeholder="Enter Gemini API Key" class="border rounded-lg px-3 py-1.5 text-sm w-64 focus:ring-2 focus:ring-indigo-300 outline-none">
            <button onclick="checkApiKey()" class="bg-indigo-600 text-white px-4 py-1.5 rounded-lg text-sm font-medium hover:bg-indigo-700 transition">Connect</button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex flex-1 overflow-hidden">
        <!-- Left Sidebar -->
        <aside class="w-64 bg-white border-r p-4 flex flex-col gap-4">
            <h2 class="font-semibold text-slate-500 uppercase text-xs tracking-widest">Library</h2>
            <input type="file" id="fileInput" multiple accept="image/*,video/*" class="hidden">
            <button onclick="document.getElementById('fileInput').click()" class="w-full bg-indigo-50 border border-indigo-200 text-indigo-600 py-2 rounded-lg font-medium hover:bg-indigo-100 transition">Upload Files</button>
            <div id="fileList" class="flex-1 overflow-y-auto custom-scrollbar space-y-2"></div>
        </aside>

        <!-- Center Viewer -->
        <section class="flex-1 bg-slate-100 flex items-center justify-center p-6 overflow-auto">
            <div id="viewer" class="max-w-4xl w-full h-full bg-white rounded-2xl shadow-sm border flex items-center justify-center p-4">
                <p class="text-slate-400">Select a file to view</p>
            </div>
        </section>

        <!-- Right Chatbot Sidebar -->
        <aside class="w-80 bg-white border-l flex flex-col">
            <div id="chatHistory" class="flex-1 p-4 overflow-y-auto custom-scrollbar space-y-4"></div>
            <div class="p-4 border-t">
                <textarea id="chatInput" placeholder="Ask about these files..." class="w-full border rounded-lg p-2 text-sm outline-none focus:ring-1 focus:ring-indigo-300" rows="3"></textarea>
                <button onclick="sendMessage()" class="mt-2 w-full bg-indigo-600 text-white py-2 rounded-lg font-medium hover:bg-indigo-700 transition">Send</button>
            </div>
        </aside>
    </main>

    <script>
        let uploadedFiles = [];
        let currentApiKey = "";

        const fileInput = document.getElementById('fileInput');
        fileInput.addEventListener('change', handleFiles);

        function handleFiles(e) {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const mediaObj = { name: file.name, type: file.type, data: ev.target.result, base64: ev.target.result.split(',')[1] };
                    uploadedFiles.push(mediaObj);
                    updateLibrary();
                };
                reader.readAsDataURL(file);
            });
        }

        function updateLibrary() {
            const list = document.getElementById('fileList');
            list.innerHTML = '';
            uploadedFiles.forEach((file, index) => {
                const div = document.createElement('div');
                div.className = "p-2 bg-slate-50 rounded cursor-pointer hover:bg-indigo-50 text-sm truncate";
                div.textContent = file.name;
                div.onclick = () => showFile(index);
                list.appendChild(div);
            });
        }

        function showFile(index) {
            const file = uploadedFiles[index];
            const viewer = document.getElementById('viewer');
            viewer.innerHTML = file.type.startsWith('video') 
                ? `<video src="${file.data}" controls class="max-h-full max-w-full"></video>`
                : `<img src="${file.data}" class="max-h-full max-w-full object-contain">`;
        }

        async function checkApiKey() {
            currentApiKey = document.getElementById('apiKey').value;
            const indicator = document.getElementById('statusIndicator');
            if (!currentApiKey) return;
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${currentApiKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: "ping" }] }] })
                });
                indicator.className = response.ok ? "w-3 h-3 rounded-full bg-green-500" : "w-3 h-3 rounded-full bg-red-500";
            } catch { indicator.className = "w-3 h-3 rounded-full bg-red-500"; }
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const chat = document.getElementById('chatHistory');
            if (!input.value || !currentApiKey) return;

            const userMsg = input.value;
            chat.innerHTML += `<div class="text-right text-sm bg-indigo-50 p-2 rounded-lg">${userMsg}</div>`;
            input.value = '';

            const parts = uploadedFiles.map(f => ({
                inlineData: { mimeType: f.type, data: f.base64 }
            }));
            parts.push({ text: userMsg });

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${currentApiKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ role: "user", parts: parts }] })
                });
                const data = await response.json();
                const botMsg = data.candidates[0].content.parts[0].text;
                chat.innerHTML += `<div class="text-left text-sm bg-slate-100 p-2 rounded-lg">${botMsg}</div>`;
            } catch (err) {
                chat.innerHTML += `<div class="text-left text-sm text-red-500">Error: Could not connect to Gemini.</div>`;
            }
        }
    </script>
</body>
</html>
